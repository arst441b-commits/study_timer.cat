<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 하람 & 젬알 스터디룸 🔥</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDCdI-fSfpxx4yscCegisfyoSOod-MJPtI",
      authDomain: "study-timer2.firebaseapp.com",
      projectId: "study-timer2",
      storageBucket: "study-timer2.firebasestorage.app",
      messagingSenderId: "1049879390031",
      appId: "1:1049879390031:web:7366b736e96aeaf2c0073a",
      measurementId: "G-5C92G8FQMB"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.settings({ experimentalForceLongPolling: true });
  </script>
  <style>
    body { margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 20px; }
    #geminiContainer { position: fixed; left: 20px; top: 20px; width: 280px; display: flex; flex-direction: column; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: calc(100vh - 40px); overflow: hidden; }
    #geminiList { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
    .gemini-msg { background: #e8f0fe; padding: 10px; border-radius: 12px; align-self: flex-start; word-break: break-all; }
    .user-msg { background: #1a73e8; color: white; padding: 8px 12px; border-radius: 12px; align-self: flex-end; word-break: break-all; }
    #geminiInputBox { display: flex; border-top: 1px solid #eee; padding: 8px; gap: 5px; }
    #geminiInput { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px; outline: none; }
    #topBox { padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 340px; }
    #topTimer { font-size: 36px; font-weight: bold; color: #1a73e8; margin-bottom: 20px; font-family: monospace; }
    .btns button { font-size: 14px; padding: 10px 12px; margin: 0 2px; cursor: pointer; border: none; border-radius: 8px; background: #1a73e8; color: white; font-weight: bold; }
    #musicBox { width: 450px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 15px; text-align: center; }
    #ytPlayerArea { background: #000; border-radius: 10px; height: 250px; overflow: hidden; margin-bottom: 12px; }
    #sidebar { position: fixed; right: 20px; top: 20px; width: 280px; display: flex; flex-direction: column; gap: 15px; height: calc(100vh - 40px); }
    #ranking, #chatContainer { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
    #ranking { padding: 15px; flex-shrink: 0; }
    #chatContainer { flex: 1; display: flex; flex-direction: column; }
    #chatList { flex: 1; padding: 10px; overflow-y: auto; font-size: 12px; }
  </style>
</head>
<body>

<div id="geminiContainer">
  <div style="padding:15px; background:#1a73e8; color:white; font-weight:bold;">🤖 조수 젬알</div>
  <div id="geminiList">관리자님, 주소와 모델명을 정밀 타격했습니다! ㅋㅋㅋㅋ</div>
  <div id="geminiInputBox">
    <input type="text" id="geminiInput" placeholder="질문 입력..." onkeypress="if(event.keyCode==13) askGemini()">
    <button onclick="askGemini()" style="border:none; background:#1a73e8; color:white; border-radius:8px; padding:0 10px; cursor:pointer;">묻기</button>
  </div>
</div>

<div id="topBox">
  <div id="topTimer">00:00:00</div>
  <div class="btns">
    <button onclick="start()">시작</button>
    <button onclick="stop()">정지</button>
    <button onclick="reset()">초기화</button>
  </div>
  <div style="margin-top:10px; font-size:12px; color:#666;">내 닉네임: <span id="currentNick">...</span></div>
</div>

<div id="musicBox">
  <div id="ytPlayerArea">
    <iframe id="videoFrame" width="100%" height="100%" src="https://www.youtube.com/embed/DFqTkjSVlqQ" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div style="display:flex; gap:5px;">
    <input type="text" id="ytUrl" placeholder="노래 제목이나 주소" style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;">
    <button onclick="handleMusic()" style="padding:8px 15px; background:#ff0000; color:white; border:none; border-radius:5px; cursor:pointer;">확인</button>
  </div>
</div>

<div id="sidebar">
  <div id="ranking">
    <b style="color:#1a73e8;">🟢 실시간 랭킹</b>
    <div id="rankList" style="font-size:13px; margin-top:10px;"></div>
  </div>
  <div id="chatContainer">
    <div id="chatList"></div>
    <div style="display:flex; padding:5px; border-top:1px solid #eee;">
      <input type="text" id="chatInput" placeholder="메시지..." style="flex:1; border:none; outline:none;" onkeypress="if(event.keyCode==13) sendChat()">
      <button onclick="sendChat()" style="border:none; background:#1a73e8; color:white; border-radius:4px; padding:2px 8px;">전송</button>
    </div>
  </div>
</div>

<script>
  // 💎 [수정 완료] 관리자님의 API 키
  const GEMINI_API_KEY = "AIzaSyBArkocrdF2LyT--gIX7ntTaqANziD025Q"; 

  async function askGemini() {
    const input = document.getElementById("geminiInput");
    const list = document.getElementById("geminiList");
    const question = input.value.trim();
    if (!question) return;

    const uDiv = document.createElement("div");
    uDiv.className = "user-msg";
    uDiv.innerText = question;
    list.appendChild(uDiv);
    input.value = "";
    list.scrollTop = list.scrollHeight;

    try {
      const cleanKey = GEMINI_API_KEY.trim();
      // 🚨 [무적 로직] 'gemini-pro' 모델로 시도합니다. (가장 호환성이 높음)
      const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + cleanKey;
      
      const response = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: question }] }] })
      });

      const data = await response.json();
      
      // 만약 gemini-pro가 없다고 하면, 마지막 수단으로 다시 flash 시도
      if (data.error) {
         throw new Error(data.error.message);
      }

      const answer = data.candidates[0].content.parts[0].text;
      const gDiv = document.createElement("div");
      gDiv.className = "gemini-msg";
      gDiv.innerText = "🤖 " + answer;
      list.appendChild(gDiv);
      
    } catch (e) {
      const errDiv = document.createElement("div");
      errDiv.style.color = "red";
      errDiv.style.fontSize = "11px";
      errDiv.innerText = "❌ 오류: " + e.message;
      list.appendChild(errDiv);
    }
    list.scrollTop = list.scrollHeight;
  }

  // 기존 기능들 (랭킹, 채팅, 타이머)
  let seconds = 0; let interval = null;
  let nickname = localStorage.getItem("nickname") || "학생_" + Math.floor(Math.random() * 1000);
  localStorage.setItem("nickname", nickname);
  document.getElementById("currentNick").innerText = nickname;

  function formatTime(s) { return new Date(s * 1000).toISOString().substr(11, 8); }
  function start() { if (!interval) interval = setInterval(() => { seconds++; document.getElementById("topTimer").innerText = formatTime(seconds); save(seconds, "studying"); }, 1000); }
  function stop() { clearInterval(interval); interval = null; save(seconds, "resting"); }
  function reset() { seconds = 0; stop(); document.getElementById("topTimer").innerText = "00:00:00"; save(0, "online"); }
  function save(s, status) { db.collection("users").doc(nickname).set({ name: nickname, time: s, status: status, lastUpdated: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true }); }
  function loadRanking() { db.collection("users").orderBy("time", "desc").onSnapshot(ss => { let h = ""; ss.forEach((doc, i) => { const u = doc.data(); h += `<div>${i+1}. ${u.name} - ${formatTime(u.time)}</div>`; }); document.getElementById("rankList").innerHTML = h; }); }
  function sendChat() { const i = document.getElementById("chatInput"); if(!i.value.trim()) return; db.collection("chats").add({ name: nickname, text: i.value, time: firebase.firestore.FieldValue.serverTimestamp() }); i.value = ""; }
  function loadChats() { db.collection("chats").orderBy("time", "asc").onSnapshot(ss => { let h = ""; ss.forEach(doc => { const d = doc.data(); h += `<div><b>${d.name}:</b> ${d.text}</div>`; }); const l = document.getElementById("chatList"); l.innerHTML = h; l.scrollTop = l.scrollHeight; }); }
  function handleMusic() { const v = document.getElementById("ytUrl").value; if (v.includes("v=")) { const id = v.split("v=")[1].split("&")[0]; document.getElementById("videoFrame").src = `https://www.youtube.com/embed/${id}?autoplay=1`; } else { window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(v)}`); } }

  loadRanking(); loadChats();
</script>
</body>
</html>
