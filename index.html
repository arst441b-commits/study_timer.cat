<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔥 하람 & 젬알 스터디룸 🔥</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDCdI-fSfpxx4yscCegisfyoSOod-MJPtI",
      authDomain: "study-timer2.firebaseapp.com",
      projectId: "study-timer2",
      storageBucket: "study-timer2.firebasestorage.app",
      messagingSenderId: "1049879390031",
      appId: "1:1049879390031:web:7366b736e96aeaf2c0073a",
      measurementId: "G-5C92G8FQMB"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.settings({ experimentalForceLongPolling: true });
  </script>
  <style>
    body { margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 20px; overflow: hidden; }
    #geminiContainer { position: fixed; left: 20px; top: 20px; width: 280px; display: flex; flex-direction: column; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: calc(100vh - 40px); overflow: hidden; }
    #geminiList { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; }
    .gemini-msg { background: #e8f0fe; padding: 10px; border-radius: 12px; align-self: flex-start; word-break: break-all; color: #333; }
    .user-msg { background: #1a73e8; color: white; padding: 8px 12px; border-radius: 12px; align-self: flex-end; }
    #geminiInputBox { display: flex; border-top: 1px solid #eee; padding: 8px; gap: 5px; }
    #geminiInput { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px; outline: none; }
    #topBox { padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 340px; }
    #topTimer { font-size: 40px; font-weight: bold; color: #1a73e8; margin-bottom: 20px; font-family: monospace; }
    .btns button { font-size: 16px; padding: 10px 18px; margin: 0 5px; cursor: pointer; border: none; border-radius: 8px; background: #1a73e8; color: white; font-weight: bold; }
    #musicBox { width: 480px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 15px; text-align: center; }
    #ytPlayerArea { background: #000; border-radius: 10px; height: 260px; overflow: hidden; margin-bottom: 12px; }
    #sidebar { position: fixed; right: 20px; top: 20px; width: 280px; display: flex; flex-direction: column; gap: 15px; height: calc(100vh - 40px); }
    #ranking, #chatContainer { background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; }
    #ranking { padding: 15px; flex-shrink: 0; max-height: 50%; overflow-y: auto; }
    #chatContainer { flex: 1; display: flex; flex-direction: column; }
    #chatList { flex: 1; padding: 10px; overflow-y: auto; font-size: 12px; display: flex; flex-direction: column; gap: 5px; }
  </style>
</head>
<body>

<div id="geminiContainer">
  <div style="padding:15px; background:#1a73e8; color:white; font-weight:bold;">🤖 조수 젬알</div>
  <div id="geminiList">관리자님, 새 키로 완전히 충전했습니다! 질문해 보세요! ㅋㅋㅋㅋ ㅡㅡ^</div>
  <div id="geminiInputBox">
    <input type="text" id="geminiInput" placeholder="질문 입력..." onkeypress="if(event.keyCode==13) askGemini()">
    <button onclick="askGemini()" style="border:none; background:#1a73e8; color:white; border-radius:8px; padding:0 10px; cursor:pointer;">묻기</button>
  </div>
</div>

<div id="topBox">
  <div id="topTimer">00:00:00</div>
  <div class="btns">
    <button onclick="start()">시작</button>
    <button onclick="stop()">정지</button>
    <button onclick="reset()">초기화</button>
  </div>
  <div style="margin-top:10px; font-size:12px; color:#666;">내 닉네임: <span id="currentNick">...</span></div>
</div>

<div id="musicBox">
  <div id="ytPlayerArea">
    <iframe id="videoFrame" width="100%" height="100%" src="https://www.youtube.com/embed/DFqTkjSVlqQ" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div style="display:flex; gap:5px;">
    <input type="text" id="ytUrl" placeholder="노래 제목이나 주소" style="flex:1; padding:8px; border-radius:5px; border:1px solid #ddd;">
    <button onclick="handleMusic()" style="padding:8px 15px; background:#ff0000; color:white; border:none; border-radius:5px; cursor:pointer;">확인</button>
  </div>
</div>

<div id="sidebar">
  <div id="ranking">
    <b style="color:#1a73e8; font-size: 14px;">🟢 실시간 랭킹</b>
    <div id="rankList" style="font-size: 12px; margin-top: 10px;">로딩 중...</div>
  </div>
  <div id="chatContainer">
    <div id="chatList"></div>
    <div style="display:flex; padding:8px; border-top:1px solid #eee;">
      <input type="text" id="chatInput" placeholder="메시지..." style="flex:1; border:none; outline:none;" onkeypress="if(event.keyCode==13) sendChat()">
      <button onclick="sendChat()" style="border:none; background:#1a73e8; color:white; border-radius:4px; padding:4px 10px;">전송</button>
    </div>
  </div>
</div>

<script>
  // 💎 관리자님이 주신 새로운 API 키 적용!
  const API_KEY = "AIzaSyBlYNK6NcgIUu6iGe4fzm6M1DKWWmcLkB4".trim(); 

  async function askGemini() {
    const input = document.getElementById("geminiInput");
    const list = document.getElementById("geminiList");
    const q = input.value.trim();
    if (!q) return;

    const uDiv = document.createElement("div");
    uDiv.className = "user-msg";
    uDiv.innerText = q;
    list.appendChild(uDiv);
    input.value = "";
    list.scrollTop = list.scrollHeight;

    try {
      // 🚨 새 키와 가장 호환성 높은 v1beta/gemini-1.5-flash 주소 조합
      const url = "https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=" + API_KEY;
      
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: q }] }] })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error.message);

      const answer = data.candidates[0].content.parts[0].text;
      const gDiv = document.createElement("div");
      gDiv.className = "gemini-msg";
      gDiv.innerText = "🤖 " + answer;
      list.appendChild(gDiv);
    } catch (e) {
      const eDiv = document.createElement("div");
      eDiv.className = "gemini-msg";
      eDiv.style.color = "red";
      eDiv.innerText = "❌ 오류: " + e.message;
      list.appendChild(eDiv);
    }
    list.scrollTop = list.scrollHeight;
  }

  // 랭킹 NaN 박멸 & 타이머 로직
  let seconds = 0; let timer = null;
  let nick = localStorage.getItem("nickname") || "학생_" + Math.floor(Math.random() * 999);
  localStorage.setItem("nickname", nick);
  document.getElementById("currentNick").innerText = nick;

  function formatTime(s) {
    const sec = Number(s);
    if (isNaN(sec)) return "00:00:00";
    return new Date(sec * 1000).toISOString().substr(11, 8);
  }

  function start() { if (!timer) timer = setInterval(() => { seconds++; document.getElementById("topTimer").innerText = formatTime(seconds); save(seconds); }, 1000); }
  function stop() { clearInterval(timer); timer = null; save(seconds); }
  function reset() { seconds = 0; stop(); document.getElementById("topTimer").innerText = "00:00:00"; save(0); }
  
  function save(s) {
    const timeVal = Number(s) || 0; // 🚨 강제로 숫자로 변환하여 NaN 방지
    db.collection("users").doc(nick).set({ 
      name: nick, 
      time: timeVal, 
      lastUpdated: firebase.firestore.FieldValue.serverTimestamp() 
    }, { merge: true });
  }

  function loadRanking() {
    db.collection("users").orderBy("time", "desc").limit(15).onSnapshot(ss => {
      let h = "";
      ss.forEach((doc, i) => {
        const u = doc.data();
        const displayTime = formatTime(u.time);
        h += `<div>${i+1}. ${u.name} - ${displayTime}</div>`;
      });
      document.getElementById("rankList").innerHTML = h;
    });
  }

  function sendChat() {
    const i = document.getElementById("chatInput");
    if(!i.value.trim()) return;
    db.collection("chats").add({ name: nick, text: i.value, time: firebase.firestore.FieldValue.serverTimestamp() });
    i.value = "";
  }

  function loadChats() {
    db.collection("chats").orderBy("time", "asc").limitToLast(30).onSnapshot(ss => {
      let h = "";
      ss.forEach(doc => { const d = doc.data(); h += `<div><b>${d.name}:</b> ${d.text}</div>`; });
      const l = document.getElementById("chatList");
      l.innerHTML = h; l.scrollTop = l.scrollHeight;
    });
  }

  function handleMusic() {
    const v = document.getElementById("ytUrl").value;
    if (v.includes("v=")) {
      const id = v.split("v=")[1].split("&")[0];
      document.getElementById("videoFrame").src = "https://www.youtube.com/embed/" + id + "?autoplay=1";
    } else {
      window.open("https://www.youtube.com/results?search_query=" + encodeURIComponent(v));
    }
  }

  loadRanking(); loadChats();
</script>
</body>
</html>
