<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            overflow: hidden;
            user-select: none;
            touch-action: none;
        }
        .cat {
            position: absolute;
            width: 80px;
            height: 80px;
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transform-origin: center;
            z-index: 1000;
        }
        .cat.dragging {
            cursor: grabbing;
        }
        /* 센서 권한 버튼 스타일 */
        #sensor-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            padding: 10px 15px;
            background: #333;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            z-index: 2000;
            cursor: pointer;
        }
    </style>
</head>
<body>

<button id="sensor-btn" onclick="requestPermission()">📱 기울기 기능 켜기</button>
<div class="cat" id="cat">🐱</div>

<script>
    const cat = document.getElementById('cat');
    const sensorBtn = document.getElementById('sensor-btn');
    
    let x = window.innerWidth / 2 - 40;
    let y = 100;
    let vx = 5; 
    let vy = 0;
    
    let baseGravity = 0.6;
    let gravityX = 0;        
    let gravityY = baseGravity; 
    
    const bounce = 0.75;
    const friction = 0.99;
    
    let isDragging = false;
    let prevX = 0;
    let prevY = 0;
    let catAngle = 0;
    let AIWalkTimer = 0;

    cat.style.left = x + 'px';
    cat.style.top = y + 'px';

    // 기울기 권한 요청 함수 (아이폰 대응)
    function requestPermission() {
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            // 아이폰용 권한 요청
            DeviceOrientationEvent.requestPermission()
                .then(permissionState => {
                    if (permissionState === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        sensorBtn.style.display = 'none'; // 연 뒤에 버튼 숨기기
                    } else {
                        alert('기울기 권한이 거부되었습니다. 폰 설정에서 브라우저 권한을 확인하세요.');
                    }
                })
                .catch(console.error);
        } else {
            // 안드로이드 및 일반 PC 브라우저
            window.addEventListener('deviceorientation', handleOrientation);
            sensorBtn.style.display = 'none';
        }
    }

    function handleOrientation(e) {
        if (e.gamma !== null && e.beta !== null) {
            gravityX = (e.gamma / 90) * 1.5; 
            gravityY = (e.beta / 90) * 1.5;
            
            if (Math.abs(gravityY) < 0.2 && Math.abs(gravityX) < 0.2) {
                gravityY = baseGravity;
            }
        }
    }

    // 드래그 기능 함수
    function startDrag(clientX, clientY) {
        isDragging = true;
        cat.classList.add('dragging');
        vx = 0;
        vy = 0;
        prevX = clientX;
        prevY = clientY;
    }

    function moveDrag(clientX, clientY) {
        if (!isDragging) return;
        vx = clientX - prevX;
        vy = clientY - prevY;
        x = clientX - 40;
        y = clientY - 40;
        cat.style.left = x + 'px';
        cat.style.top = y + 'px';
        prevX = clientX;
        prevY = clientY;
        catAngle = vx * 2;
        cat.style.transform = `rotate(${catAngle}deg)`;
    }

    function endDrag() {
        if (isDragging) {
            isDragging = false;
            cat.classList.remove('dragging');
        }
    }

    // 마우스 및 터치 이벤트 연결
    cat.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', endDrag);

    cat.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        startDrag(touch.clientX, touch.clientY);
    });
    window.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        moveDrag(touch.clientX, touch.clientY);
    });
    window.addEventListener('touchend', endDrag);

    // 물리 엔진 루프
    function updatePhysics() {
        if (!isDragging) {
            if (Math.abs(gravityX) < 0.3) {
                AIWalkTimer++;
                if (AIWalkTimer > 100) { 
                    if (y >= window.innerHeight - 85) {
                        if (Math.random() < 0.4) {
                            vy = -(Math.random() * 8 + 6); 
                            vx = (Math.random() - 0.5) * 15; 
                        }
                    }
                    AIWalkTimer = 0;
                }
            }

            vx += gravityX;
            vy += gravityY;
            vx *= friction;
            vy *= friction;
            x += vx;
            y += vy;

            const maxX = window.innerWidth - 80;
            const maxY = window.innerHeight - 80;

            if (y >= maxY) { y = maxY; vy = -vy * bounce; vx *= 0.9; }
            if (y <= 0) { y = 0; vy = -vy * bounce; vx *= 0.9; }
            if (x >= maxX) { x = maxX; vx = -vx * bounce; vy *= 0.9; }
            if (x <= 0) { x = 0; vx = -vx * bounce; vy *= 0.9; }

            catAngle += vx * 0.8;
            cat.style.left = x + 'px';
            cat.style.top = y + 'px';
            cat.style.transform = `rotate(${catAngle}deg)`;
        }
        requestAnimationFrame(updatePhysics);
    }

    updatePhysics();

    window.addEventListener('resize', () => {
        if (x > window.innerWidth - 80) x = window.innerWidth - 80;
        if (y > window.innerHeight - 80) y = window.innerHeight - 80;
    });
</script>

</body>
</html>
