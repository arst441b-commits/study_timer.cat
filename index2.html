<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🐱</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #f0f2f5;
            overflow: hidden;
            user-select: none;
            touch-action: none; /* 스마트폰 화면이 멋대로 스크롤되거나 확대되는 걸 막아줍니다 */
        }
        .cat {
            position: absolute;
            width: 80px;
            height: 80px;
            font-size: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: grab;
            transform-origin: center;
            z-index: 1000;
        }
        .cat.dragging {
            cursor: grabbing;
        }
    </style>
</head>
<body>

<div class="cat" id="cat">🐱</div>

<script>
    const cat = document.getElementById('cat');
    
    let x = window.innerWidth / 2 - 40;
    let y = 100;
    let vx = 5; 
    let vy = 0;
    const gravity = 0.6;
    const bounce = 0.75;
    const friction = 0.99;
    
    let isDragging = false;
    let prevX = 0;
    let prevY = 0;
    let catAngle = 0;
    let AIWalkTimer = 0;

    cat.style.left = x + 'px';
    cat.style.top = y + 'px';

    // --- 마우스 & 터치 이벤트 통합 함수 ---
    function startDrag(clientX, clientY) {
        isDragging = true;
        cat.classList.add('dragging');
        vx = 0;
        vy = 0;
        prevX = clientX;
        prevY = clientY;
    }

    function moveDrag(clientX, clientY) {
        if (!isDragging) return;
        vx = clientX - prevX;
        vy = clientY - prevY;
        x = clientX - 40;
        y = clientY - 40;
        cat.style.left = x + 'px';
        cat.style.top = y + 'px';
        prevX = clientX;
        prevY = clientY;
        catAngle = vx * 2;
        cat.style.transform = `rotate(${catAngle}deg)`;
    }

    function endDrag() {
        if (isDragging) {
            isDragging = false;
            cat.classList.remove('dragging');
        }
    }

    // 컴퓨터 마우스 이벤트
    cat.addEventListener('mousedown', (e) => startDrag(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => moveDrag(e.clientX, e.clientY));
    window.addEventListener('mouseup', endDrag);

    // 스마트폰 터치 이벤트 추가!📱
    cat.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        startDrag(touch.clientX, touch.clientY);
    });
    window.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        moveDrag(touch.clientX, touch.clientY);
    });
    window.addEventListener('touchend', endDrag);

    // 물리 엔진 루프
    function updatePhysics() {
        if (!isDragging) {
            AIWalkTimer++;
            if (AIWalkTimer > 100) { 
                if (y >= window.innerHeight - 85) {
                    if (Math.random() < 0.4) {
                        vy = -(Math.random() * 8 + 6); 
                        vx = (Math.random() - 0.5) * 15; 
                    }
                }
                AIWalkTimer = 0;
            }

            vy += gravity;
            vx *= friction;
            vy *= friction;

            x += vx;
            y += vy;

            const maxX = window.innerWidth - 80;
            const maxY = window.innerHeight - 80;

            if (y >= maxY) {
                y = maxY;
                vy = -vy * bounce;
                if (Math.abs(vx) < 1) vx = (Math.random() > 0.5 ? 2 : -2);
            }
            if (y <= 0) {
                y = 0;
                vy = -vy * bounce;
            }
            if (x >= maxX) {
                x = maxX;
                vx = -vx * bounce;
                vy = -Math.random() * 5; 
            }
            if (x <= 0) {
                x = 0;
                vx = -vx * bounce;
                vy = -Math.random() * 5; 
            }

            catAngle += vx * 0.8;
            
            cat.style.left = x + 'px';
            cat.style.top = y + 'px';
            cat.style.transform = `rotate(${catAngle}deg)`;
        }
        requestAnimationFrame(updatePhysics);
    }

    updatePhysics();

    window.addEventListener('resize', () => {
        if (x > window.innerWidth - 80) x = window.innerWidth - 80;
        if (y > window.innerHeight - 80) y = window.innerHeight - 80;
    });
</script>

</body>
</html>
