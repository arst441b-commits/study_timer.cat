<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>🔥 하람 & 젬알 스터디룸 🔥</title>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyDCdI-fSfpxx4yscCegisfyoSOod-MJPtI",
      authDomain: "study-timer2.firebaseapp.com",
      projectId: "study-timer2",
      storageBucket: "study-timer2.firebasestorage.app",
      messagingSenderId: "1049879390031",
      appId: "1:1049879390031:web:7366b736e96aeaf2c0073a",
      measurementId: "G-5C92G8FQMB"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    db.settings({ experimentalForceLongPolling: true });
  </script>
  <style>
    body { margin: 0; font-family: 'Malgun Gothic', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; gap: 20px; }
    
    /* 중앙 영역 */
    #topBox { padding: 30px; background: white; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 340px; z-index: 1; }
    #topTimer { font-size: 36px; font-weight: bold; color: #1a73e8; margin-bottom: 20px; font-family: monospace; }
    .btns button { font-size: 14px; padding: 10px 12px; margin: 0 2px; cursor: pointer; border: none; border-radius: 8px; background: #1a73e8; color: white; font-weight: bold; transition: 0.2s; }
    .btns button:hover { background: #1557b0; }
    
    #musicBox { width: 450px; background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 15px; text-align: center; }
    #ytPlayerArea { background: #000; border-radius: 10px; height: 250px; overflow: hidden; margin-bottom: 12px; border: 1px solid #ddd; }

    #userArea { margin-top: 15px; padding-top: 15px; border-top: 1px solid #eee; font-size: 14px; color: #666; }
    #currentNick { font-weight: bold; color: #333; }
    .edit-btn { background: #f0f2f5 !important; color: #555 !important; font-size: 11px !important; padding: 4px 8px !important; margin-left: 5px !important; }

    /* 왼쪽 젬알 AI 영역 */
    #geminiContainer { position: fixed; left: 20px; top: 20px; width: 280px; display: flex; flex-direction: column; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: calc(100vh - 40px); overflow: hidden; }
    #geminiList { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 10px; background: #f8f9fa; color: #555; }
    .gemini-msg { background: #e8f0fe; padding: 10px; border-radius: 12px; border-bottom-left-radius: 2px; align-self: flex-start; word-break: break-all; }
    .user-msg { background: #1a73e8; color: white; padding: 8px 12px; border-radius: 12px; border-bottom-right-radius: 2px; align-self: flex-end; word-break: break-all; }
    #geminiInputBox { display: flex; border-top: 1px solid #eee; padding: 8px; gap: 5px; }
    #geminiInput { flex: 1; border: 1px solid #ddd; border-radius: 8px; padding: 8px; outline: none; font-size: 12px; }
    #geminiSendBtn { border: none; background: #1a73e8; color: white; border-radius: 8px; padding: 0 12px; cursor: pointer; font-weight: bold; }

    /* 오른쪽 랭킹 & 채팅 영역 */
    #sidebar { position: fixed; right: 20px; top: 20px; width: 280px; display: flex; flex-direction: column; gap: 15px; height: calc(100vh - 40px); }
    #ranking { padding: 20px; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); flex-shrink: 0; }
    .rank-title { font-size: 18px; font-weight: bold; display: block; margin-bottom: 10px; color: #333; border-bottom: 2px solid #f0f2f5; padding-bottom: 10px; text-align: center; }
    .user-item { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
    .user-name { font-weight: 600; color: #555; }
    .user-time { font-family: monospace; font-weight: bold; color: #d93025; }
    
    .status-dot { font-size: 10px; margin-left: 5px; vertical-align: middle; }
    .dot-online { color: #bdc3c7; } 
    .dot-studying { color: #2ecc71; } 
    .dot-resting { color: #e74c3c; } 

    #chatContainer { flex: 1; display: flex; flex-direction: column; background: white; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); overflow: hidden; min-height: 200px; }
    #chatList { flex: 1; padding: 15px; overflow-y: auto; font-size: 13px; display: flex; flex-direction: column; gap: 8px; }
    .chat-msg { background: #f1f3f4; padding: 6px 10px; border-radius: 10px; width: fit-content; max-width: 90%; word-break: break-all; }
    .chat-msg b { color: #1a73e8; margin-right: 5px; }
    #chatInputBox { display: flex; border-top: 1px solid #eee; padding: 5px; gap: 3px; }
    #chatInput { flex: 1; border: none; padding: 8px; outline: none; font-size: 13px; }
    #chatSendBtn { border: none; background: #1a73e8; color: white; border-radius: 5px; padding: 0 10px; cursor: pointer; font-weight: bold; }
    .trash-btn { border: none; background: #e74c3c; color: white; border-radius: 5px; padding: 0 8px; cursor: pointer; font-size: 14px; }
    
    #musicInputArea { display: flex; gap: 5px; }
    #musicInputArea input { flex: 1; padding: 8px; border: 1px solid #ddd; border-radius: 5px; font-size: 12px; outline: none; }
    #musicInputArea button { padding: 8px 12px; background: #ff0000; color: white; border: none; border-radius: 5px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
  </style>
</head>
<body>

<div id="geminiContainer">
  <span class="rank-title">🤖 조수 젬알</span>
  <div id="geminiList">안녕하세요, 관리자님! 무엇을 도와드릴까요?</div>
  <div id="geminiInputBox">
    <input type="text" id="geminiInput" placeholder="젬알에게 질문하기..." onkeypress="if(event.keyCode==13) askGemini()">
    <button id="geminiSendBtn" onclick="askGemini()">묻기</button>
  </div>
</div>

<div id="topBox">
  <div id="topTimer">00:00:00</div>
  <div class="btns">
    <button onclick="start()">시작</button>
    <button onclick="stop()">정지</button>
    <button onclick="reset()">초기화</button>
  </div>
  <div id="userArea">
    내 닉네임: <span id="currentNick">로딩 중...</span>
    <button class="edit-btn" onclick="changeNickname()">변경</button>
  </div>
</div>

<div id="musicBox">
  <div id="ytPlayerArea">
    <iframe id="videoFrame" width="100%" height="100%" src="https://www.youtube.com/embed/DFqTkjSVlqQ?start=49&autoplay=0" frameborder="0" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
  <div id="musicInputArea">
    <input type="text" id="ytUrl" placeholder="노래 검색 또는 주소 붙여넣기" onkeypress="if(event.keyCode==13) handleMusic()">
    <button onclick="handleMusic()">확인</button>
  </div>
  <p style="margin: 8px 0 0 0; font-size: 11px; color: #999;">*단어를 쓰면 검색, 주소를 쓰면 노래가 재생돼요!</p>
</div>

<div id="sidebar">
  <div id="ranking">
    <span class="rank-title">🟢 실시간 랭킹</span>
    <div id="rankList">불러오는 중...</div>
  </div>
  <div id="chatContainer">
    <div id="chatList">채팅 로딩 중...</div>
    <div id="chatInputBox">
      <input type="text" id="chatInput" placeholder="내용을 입력하세용." onkeypress="if(event.keyCode==13) sendChat()">
      <button id="chatSendBtn" onclick="sendChat()">전송</button>
      <button class="trash-btn" onclick="clearChats()">🗑️</button>
    </div>
  </div>
</div>

<script>
  let seconds = 0;
  let interval = null;
  let studyStatus = "online"; 
  let nickname = localStorage.getItem("nickname");

  // Gemini 설정
  const GEMINI_API_KEY = "AIzaSyBArkocrdF2LyT--gIX7ntTaqANziD025Q"; 

  async function askGemini() {
    const input = document.getElementById("geminiInput");
    const list = document.getElementById("geminiList");
    const question = input.value.trim();
    if (!question) return;

    // 내 말 표시
    const userDiv = document.createElement("div");
    userDiv.className = "user-msg";
    userDiv.innerText = question;
    list.appendChild(userDiv);
    input.value = "";
    list.scrollTop = list.scrollHeight;

    try {
      const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ contents: [{ parts: [{ text: question }] }] })
      });
      const data = await response.json();
      const answer = data.candidates[0].content.parts[0].text;

      // 젬알 답변 표시
      const geminiDiv = document.createElement("div");
      geminiDiv.className = "gemini-msg";
      geminiDiv.innerText = "🤖 " + answer;
      list.appendChild(geminiDiv);
    } catch (e) {
      const errDiv = document.createElement("div");
      errDiv.innerText = "❌ 키를 확인해주세요!";
      list.appendChild(errDiv);
    }
    list.scrollTop = list.scrollHeight;
  }

  // 기존 기능들...
  if (!nickname) {
    nickname = prompt("사용할 닉네임을 입력하세요");
    if (!nickname) nickname = "익명_" + Math.floor(Math.random() * 1000);
    localStorage.setItem("nickname", nickname);
  }
  document.getElementById("currentNick").innerText = nickname;

  function formatTime(s) {
    const h = String(Math.floor(s / 3600)).padStart(2, '0');
    const m = String(Math.floor((s % 3600) / 60)).padStart(2, '0');
    const sec = String(s % 60).padStart(2, '0');
    return `${h}:${m}:${sec}`;
  }

  function update() {
    seconds++;
    document.getElementById("topTimer").innerText = formatTime(seconds);
    localStorage.setItem("study_seconds", seconds);
    saveToServer(seconds, "studying"); 
  }

  function start() { studyStatus = "studying"; if (!interval) interval = setInterval(update, 1000); saveToServer(seconds, "studying"); }
  function stop() { studyStatus = "resting"; clearInterval(interval); interval = null; saveToServer(seconds, "resting"); }
  function reset() { if(confirm("초기화하시겠습니까?")) { seconds = 0; stop(); studyStatus = "online"; document.getElementById("topTimer").innerText = "00:00:00"; saveToServer(0, "online"); } }

  function saveToServer(s, status) {
    db.collection("users").doc(nickname).set({
      name: nickname, time: s, status: status,
      lastUpdated: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
  }

  function loadRanking() {
    db.collection("users").onSnapshot((snapshot) => {
      let users = [];
      snapshot.forEach((doc) => { if (doc.data().status !== "offline") users.push(doc.data()); });
      users.sort((a, b) => b.time - a.time);
      let html = "";
      users.forEach((u, i) => {
        let dotClass = u.status === "studying" ? "dot-studying" : (u.status === "resting" ? "dot-resting" : "dot-online");
        html += `<div class="user-item"><span class="user-name">${i+1}. ${u.name}<span class="status-dot ${dotClass}">●</span></span><span class="user-time">${formatTime(u.time)}</span></div>`;
      });
      document.getElementById("rankList").innerHTML = html || "접속자 없음";
    });
  }

  function sendChat() {
    const input = document.getElementById("chatInput");
    if (!input.value.trim()) return;
    const msgRef = db.collection("chats").doc();
    msgRef.set({ name: nickname, text: input.value, time: firebase.firestore.FieldValue.serverTimestamp() })
    .then(() => { input.value = ""; setTimeout(() => { msgRef.delete(); }, 10000); });
  }

  function loadChats() {
    db.collection("chats").orderBy("time", "asc").onSnapshot((snapshot) => {
      let html = "";
      snapshot.forEach((doc) => { html += `<div class="chat-msg"><b>${doc.data().name}:</b>${doc.data().text}</div>`; });
      const list = document.getElementById("chatList");
      list.innerHTML = html || "조용한 채팅창입니다.";
      list.scrollTop = list.scrollHeight;
    });
  }

  async function clearChats() {
    if(confirm("모든 채팅 기록을 삭제할까요?")) {
      const snapshot = await db.collection("chats").get();
      const batch = db.batch();
      snapshot.forEach(doc => batch.delete(doc.ref));
      await batch.commit();
    }
  }

  function handleMusic() {
    const input = document.getElementById('ytUrl').value.trim();
    if (!input) return;
    if (input.includes("youtube.com") || input.includes("youtu.be")) {
      let videoId = "";
      let startAt = 0;
      if (input.includes("v=")) {
        videoId = input.split("v=")[1].split("&")[0];
        if (input.includes("t=")) startAt = input.split("t=")[1].split("s")[0];
      } else if (input.includes("be/")) {
        videoId = input.split("be/")[1].split("?")[0];
        if (input.includes("t=")) startAt = input.split("t=")[1].split("s")[0];
      }
      if(videoId) {
        document.getElementById('videoFrame').src = `https://www.youtube.com/embed/${videoId}?start=${startAt}&autoplay=1`;
        document.getElementById('ytUrl').value = "";
      }
    } else {
      window.open(`https://www.youtube.com/results?search_query=${encodeURIComponent(input)}`, '_blank');
      document.getElementById('ytUrl').value = "";
    }
  }

  async function changeNickname() {
    const newNick = prompt("새로운 닉네임을 입력하세요", nickname);
    if (newNick && newNick !== nickname) {
      await db.collection("users").doc(nickname).update({ status: "offline" });
      nickname = newNick;
      localStorage.setItem("nickname", nickname);
      document.getElementById("currentNick").innerText = nickname;
      saveToServer(seconds, studyStatus);
    }
  }

  window.addEventListener('visibilitychange', () => saveToServer(seconds, document.visibilityState === 'visible' ? studyStatus : "offline"));
  window.addEventListener('beforeunload', () => saveToServer(seconds, "offline"));

  const saved = localStorage.getItem("study_seconds");
  if (saved) seconds = parseInt(saved);
  document.getElementById("topTimer").innerText = formatTime(seconds);
  saveToServer(seconds, "online");
  loadRanking();
  loadChats();
</script>
</body>
</html>
